<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 먹지? | 직장인 메뉴 추천</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- <link href="https://fonts.googleapis.com/css?family=Song+Myung:400" rel="stylesheet"> -->
<style>
  :root{
    --bg:#FFF8F0;--card:#FFFFFF;--primary:#FF6B35;--primary-light:#FF8C5A;
    --primary-bg:#FFF0E8;--secondary:#2D3A3A;--accent:#F7C948;--accent2:#E8505B;
    --text:#2D3A3A;--text-light:#6B7B7B;--border:#E8DDD0;
    --drink:#8B5CF6;--drink-bg:#F3EEFF;
    --shadow:0 2px 20px rgba(45,58,58,.08);--radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999}
  .container{max-width:500px;margin:0 auto;padding:20px 20px 80px}

  header{text-align:center;padding:28px 0 20px}
  header .emoji-float{font-size:46px;display:inline-block;animation:bounce 2s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  header h1{font-family:'Black Han Sans',sans-serif;font-size:32px;color:var(--secondary);margin:8px 0 4px;letter-spacing:-1px}
  header h1 span{color:var(--primary)}
  header p{color:var(--text-light);font-size:13px;font-weight:300}

  .step{display:none;animation:fadeUp .35s ease}.step.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .progress-bar{display:flex;gap:6px;margin-bottom:22px}
  .progress-dot{height:4px;border-radius:2px;flex:1;background:var(--border);transition:background .3s}
  .progress-dot.filled{background:var(--primary)}.progress-dot.current{background:var(--accent)}

  .step-label{display:inline-flex;background:var(--secondary);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;margin-bottom:10px}
  .step-title{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--secondary);line-height:1.4;margin-bottom:4px}
  .step-subtitle{font-size:12px;color:var(--text-light);margin-bottom:16px;font-weight:300}

  .options{display:flex;flex-wrap:wrap;gap:8px}
  .option-chip{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--card);border:2px solid var(--border);border-radius:14px;
    padding:10px 16px;cursor:pointer;transition:all .2s;user-select:none;
    -webkit-tap-highlight-color:transparent;font-size:14px;font-weight:500;
  }
  .option-chip .icon{font-size:20px}
  .option-chip:hover{border-color:var(--primary);transform:translateY(-1px)}
  .option-chip.selected{border-color:var(--primary);background:var(--primary-bg);box-shadow:0 2px 12px rgba(255,107,53,.15)}
  .option-chip.selected::after{
    content:'✓';font-size:12px;font-weight:900;color:var(--primary);
    background:#fff;width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--primary);
  }

  /* Drink step - special big cards */
  .drink-options{display:flex;gap:10px}
  .drink-card{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
    background:var(--card);border:2.5px solid var(--border);border-radius:20px;
    padding:24px 12px;cursor:pointer;transition:all .25s;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .drink-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .drink-card:active{transform:scale(.97)}
  .drink-card .drink-emoji{font-size:40px}
  .drink-card .drink-label{font-weight:700;font-size:16px}
  .drink-card .drink-desc{font-size:11px;color:var(--text-light);font-weight:300;text-align:center}

  .next-bar{display:flex;gap:10px;margin-top:20px;align-items:center}
  .btn-next{
    flex:1;padding:14px;border-radius:14px;border:none;
    font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;transition:all .2s;background:var(--primary);color:#fff;
  }
  .btn-next:disabled{background:var(--border);color:var(--text-light);cursor:default}
  .btn-next:not(:disabled):hover{background:var(--primary-light);transform:translateY(-1px)}
  .selected-count{font-size:12px;color:var(--text-light);white-space:nowrap}

  .back-btn{
    display:inline-flex;align-items:center;gap:4px;background:none;border:none;
    color:var(--text-light);font-size:13px;font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;margin-bottom:12px;padding:4px 0;
  }
  .back-btn:hover{color:var(--primary)}

  /* ── RESULT: 3-card layout ── */
  .result-header{text-align:center;margin-bottom:16px}
  .result-header .rh-emoji{font-size:32px;margin-bottom:4px}
  .result-header .rh-title{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--secondary)}
  .result-header .rh-sub{font-size:12px;color:var(--text-light);font-weight:300}

  .result-grid{display:flex;flex-direction:column;gap:10px}
  .menu-card{
    background:var(--card);border:2px solid var(--border);border-radius:18px;
    padding:20px;display:flex;align-items:flex-start;gap:14px;
    transition:all .2s;cursor:default;position:relative;overflow:hidden;
    animation:cardIn .4s ease both;
  }
  .menu-card:nth-child(1){animation-delay:.05s}
  .menu-card:nth-child(2){animation-delay:.15s}
  .menu-card:nth-child(3){animation-delay:.25s}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .menu-card::before{
    content:'';position:absolute;top:0;left:0;width:4px;height:100%;
    background:var(--primary);border-radius:0 4px 4px 0;
  }
  .menu-card:nth-child(2)::before{background:var(--accent)}
  .menu-card:nth-child(3)::before{background:var(--accent2)}

  .mc-emoji{font-size:38px;flex-shrink:0;margin-top:2px}
  .mc-body{flex:1;min-width:0}
  .mc-name{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--secondary);margin-bottom:3px}
  .mc-desc{font-size:12px;color:var(--text-light);line-height:1.5;font-weight:300;margin-bottom:8px}
  .mc-tags{display:flex;gap:4px;flex-wrap:wrap}
  .mc-tag{background:var(--bg);color:var(--text-light);font-size:10px;padding:3px 9px;border-radius:12px;font-weight:500}
  .mc-rank{
    position:absolute;top:10px;right:14px;
    font-family:'Black Han Sans',sans-serif;font-size:14px;color:var(--border);
  }

  .action-bar{display:flex;gap:8px;margin-top:18px}
  .btn{flex:1;padding:13px;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-light)}
  .btn-secondary{background:var(--bg);color:var(--text);border:2px solid var(--border)}
  .btn-secondary:hover{border-color:var(--primary)}
  .btn-random{
    width:100%;padding:14px;border-radius:14px;
    background:linear-gradient(135deg,var(--accent2),var(--primary));
    color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
    cursor:pointer;border:none;margin-top:14px;transition:all .2s;
  }
  .btn-random:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,80,91,.3)}

  .match-info{font-size:12px;color:var(--text-light);text-align:center;margin-top:14px}
  .match-info strong{color:var(--primary)}

  footer{text-align:center;padding:32px 0 20px;color:var(--text-light);font-size:11px;font-weight:300}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="emoji-float">🍽️</div>
    <h1>오늘 <span>뭐</span> 먹지?</h1>
    <p>3단계로 메뉴 결정 끝!</p>
  </header>
  <div class="progress-bar" id="progress">
    <div class="progress-dot current"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>

  <!-- STEP 1: 술 -->
  <div class="step active" id="step1">
    <div class="step-label">STEP 1</div>
    <div class="step-title">술? 🍻</div>
    <!-- <div class="step-subtitle">술 여부에 따라 메뉴가 달라져요</div> -->
    <div class="drink-options">
      <div class="drink-card" onclick="pickDrink('yes')">
        <div class="drink-emoji">🍺</div>
        <div class="drink-label">술?</div>
        <div class="drink-desc">간다뒤지는날</div>
      </div>
      <div class="drink-card" onclick="pickDrink('no')">
        <div class="drink-emoji">🥤</div>
        <div class="drink-label">술ㄴㄴ?</div>
        <div class="drink-desc">쫄?ㅋㅋ</div>
      </div>
      <div class="drink-card" onclick="pickDrink('maybe')">
        <div class="drink-emoji">🤷</div>
        <div class="drink-label">간잽이</div>
        <div class="drink-desc">분위기 봐서~</div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 누구랑 -->
  <div class="step" id="step2">
    <button class="back-btn" onclick="goBack(1)">← 뒤로</button>
    <div class="step-label">STEP 2</div>
    <div class="step-title">누구랑 먹어? 🤔</div>
    <div class="step-subtitle">여러 개 선택 가능!</div>
    <div class="options" id="opts2"></div>
    <div class="next-bar">
      <span class="selected-count" id="count2">0개 선택</span>
      <button class="btn-next" id="next2" disabled onclick="goNext(2)">다음 →</button>
    </div>
  </div>

  <!-- STEP 3: 분위기 -->
  <div class="step" id="step3">
    <button class="back-btn" onclick="goBack(2)">← 뒤로</button>
    <div class="step-label">STEP 3</div>
    <div class="step-title">어떤 분위기로? ✨</div>
    <div class="step-subtitle">여러 개 선택 가능!</div>
    <div class="options" id="opts3"></div>
    <div class="next-bar">
      <span class="selected-count" id="count3">0개 선택</span>
      <button class="btn-next" id="next3" disabled onclick="showResult()">메뉴 추천받기 🎉</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="step" id="result">
    <button class="back-btn" onclick="goBack(3)">← 다시 고르기</button>
    <div class="result-header">
      <div class="rh-emoji">🎯</div>
      <div class="rh-title">오늘의 추천 메뉴</div>
      <div class="rh-sub" id="resultSub">이 중에서 골라보세요!</div>
    </div>
    <div class="result-grid" id="resultGrid"></div>
    <div class="action-bar">
      <button class="btn btn-secondary" onclick="reroll()">🎲 다른 3개 보기</button>
      <button class="btn btn-primary" onclick="restart()">🔄 처음부터</button>
    </div>
    <button class="btn-random" onclick="totalRandom()">🎰 그냥 아무거나 3개 골라줘!</button>
    <div class="match-info" id="matchInfo"></div>
  </div>

  <footer>만든 사람: 배고픈 직장인 | 오늘도 맛있는 한 끼 되세요 🙏</footer>
</div>

// ── STATE ──
let drinkChoice = null; // 'yes','no','maybe'
const sel = { who: new Set(), vibe: new Set() };
let filtered = [];
let shown = []; // currently displayed 3
let spinTimer = null;

// ── INIT ──
function init() {
  document.getElementById('opts2').innerHTML = WHO_ITEMS.map(i =>
    `<div class="option-chip" data-id="${i.id}" onclick="toggle(this,'who',2)"><span class="icon">${i.icon}</span> ${i.label}</div>`
  ).join('');
  document.getElementById('opts3').innerHTML = VIBE_ITEMS.map(i =>
    `<div class="option-chip" data-id="${i.id}" onclick="toggle(this,'vibe',3)"><span class="icon">${i.icon}</span> ${i.label}</div>`
  ).join('');
}

function pickDrink(val) {
  drinkChoice = val;
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  updateProgress(2);
}

function toggle(el, key, num) {
  const id = el.dataset.id;
  if (sel[key].has(id)) { sel[key].delete(id); el.classList.remove('selected'); }
  else { sel[key].add(id); el.classList.add('selected'); }
  const c = sel[key].size;
  document.getElementById('count'+num).textContent = c+'개 선택';
  document.getElementById('next'+num).disabled = c === 0;
}

function goNext(from) {
  document.getElementById('step'+from).classList.remove('active');
  document.getElementById('step'+(from+1)).classList.add('active');
  updateProgress(from+1);
}

function goBack(to) {
  ['step1','step2','step3','result'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById('step'+to).classList.add('active');
  updateProgress(to);
}

function updateProgress(s) {
  document.querySelectorAll('.progress-dot').forEach((d,i) => {
    d.classList.remove('filled','current');
    if (i < s-1) d.classList.add('filled');
    if (i === s-1) d.classList.add('current');
  });
}

// ── FILTER ──
function doFilter() {
  return M.filter(m => {
    // Drink filter
    if (drinkChoice === 'yes' && m.dk === 0) return false;  // 술 O → 식사전용 제외
    if (drinkChoice === 'no' && m.dk === 2) return false;   // 술 X → 술자리전용 제외
    // maybe → 전부 OK

    const wm = sel.who.size === 0 || m.w.some(x => sel.who.has(x));
    const vm = sel.vibe.size === 0 || m.v.some(x => sel.vibe.has(x));
    return wm && vm;
  }).sort(() => Math.random() - .5);
}

// ── RESULT ──
function showResult() {
  filtered = doFilter();
  ['step1','step2','step3','result'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById('result').classList.add('active');
  updateProgress(4);

  if (filtered.length === 0) {
    document.getElementById('resultSub').textContent = '조건에 맞는 메뉴가 없어요. 선택을 줄여보세요!';
    document.getElementById('resultGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light)">🤷 조합을 바꿔보세요!</div>';
    document.getElementById('matchInfo').innerHTML = '';
    return;
  }

  document.getElementById('resultSub').textContent = '이 중에서 골라보세요!';
  shown = filtered.slice(0, 3);
  renderCards();
  document.getElementById('matchInfo').innerHTML = `전체 <strong>${filtered.length}개</strong> 메뉴 중 추천`;
}

function renderCards() {
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = shown.map((m, i) => `
    <div class="menu-card">
      <div class="mc-rank">${i+1}</div>
      <div class="mc-emoji">${m.e}</div>
      <div class="mc-body">
        <div class="mc-name">${m.n}</div>
        <div class="mc-desc">${m.d}</div>
        <div class="mc-tags">${m.t.map(x=>`<span class="mc-tag">#${x}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  // Re-trigger animation
  grid.style.animation = 'none';
  grid.offsetHeight;
  grid.style.animation = '';
}

function reroll() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  const pool = filtered.length > 3 ? filtered : M;
  const currentNames = new Set(shown.map(m => m.n));
  const others = pool.filter(m => !currentNames.has(m.n));

  if (others.length < 3) {
    shown = pool.sort(() => Math.random() - .5).slice(0, 3);
  } else {
    shown = others.sort(() => Math.random() - .5).slice(0, 3);
  }
  renderCards();
}

function totalRandom() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  const grid = document.getElementById('resultGrid');
  let count = 0;
  spinTimer = setInterval(() => {
    const r = [0,1,2].map(() => M[Math.floor(Math.random() * M.length)]);
    grid.innerHTML = r.map((m,i) => `
      <div class="menu-card" style="animation:none">
        <div class="mc-rank">${i+1}</div>
        <div class="mc-emoji">${m.e}</div>
        <div class="mc-body"><div class="mc-name">${m.n}</div></div>
      </div>
    `).join('');
    count++;
    if (count > 12) {
      clearInterval(spinTimer); spinTimer = null;
      // Pick 3 unique
      const shuffled = [...M].sort(() => Math.random() - .5);
      const unique = [];
      const seen = new Set();
      for (const m of shuffled) {
        if (!seen.has(m.n)) { unique.push(m); seen.add(m.n); }
        if (unique.length === 3) break;
      }
      shown = unique;
      renderCards();
      document.getElementById('matchInfo').innerHTML = `전체 <strong>${M.length}개</strong> 메뉴에서 랜덤 추천`;
    }
  }, 100);
}

function restart() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  drinkChoice = null;
  sel.who.clear(); sel.vibe.clear();
  document.querySelectorAll('.option-chip.selected').forEach(e => e.classList.remove('selected'));
  [2,3].forEach(i => {
    document.getElementById('count'+i).textContent = '0개 선택';
    document.getElementById('next'+i).disabled = true;
  });
  ['step1','step2','step3','result'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById('step1').classList.add('active');
  updateProgress(1);
}

init();
</script>
